name: terraform-ai-delete

on:
  issue_comment:
    types: [created]

jobs:
  impact:
    if: startsWith(github.event.comment.body, 'terraform-ai: delete')
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.outputs_step.outputs.pr_number }}
      dependency_status: ${{ steps.outputs_step.outputs.dependency_status }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run delete workflow (impact stage)
        run: |
          python workflows/delete_graph.py "${{ github.event.comment.body }}"

      - name: Export outputs
        id: outputs_step
        run: |
          # Placeholder output wiring for downstream job conditions.
          echo "pr_number=0" >> "$GITHUB_OUTPUT"
          echo "dependency_status=safe" >> "$GITHUB_OUTPUT"

  destroy:
    needs: impact
    runs-on: ubuntu-latest
    environment: production
    if: |
      needs.impact.outputs.dependency_status != 'block' &&
      startsWith(github.event.comment.body, 'delete ')
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run targeted destroy agent
        run: |
          python -c "from agents.destroy_agent import destroy_agent; print(destroy_agent({'gate1_passed':True,'gate2_passed':True,'gate3_passed':True,'gate4_passed':True,'target_resource_name':'typed-confirm','resource_type':'ec2','resource_region':'us-east-1','pr_number':${{ needs.impact.outputs.pr_number || 0 }}}))"
