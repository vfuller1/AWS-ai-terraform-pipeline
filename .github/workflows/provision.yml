name: terraform-ai-provision

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      request:
        description: Provisioning request in natural language
        required: true
        type: string

defaults:
  run:
    working-directory: terraform-ai

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, 'terraform-ai: provision'))
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.extract.outputs.pr_number }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      LANGCHAIN_TRACING_V2: ${{ secrets.LANGCHAIN_TRACING_V2 }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_PROJECT: terraform-ai-capstone
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Infracost CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          echo "$HOME/.infracost/bin" >> $GITHUB_PATH

      - name: Run provisioning workflow
        id: runflow
        run: |
          REQUEST="${{ inputs.request }}"
          if [ -z "$REQUEST" ] && [ "${{ github.event_name }}" = "issue_comment" ]; then
            REQUEST="${{ github.event.comment.body }}"
          fi
          python -m workflows.provisioning_graph "$REQUEST"

      - name: Extract PR number
        id: extract
        run: |
          # Placeholder output wiring for downstream jobs.
          echo "pr_number=0" >> "$GITHUB_OUTPUT"

  fix:
    if: "github.event_name == 'issue_comment' && startsWith(github.event.comment.body, 'terraform-ai: fix it')"
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fix agent
        run: |
          python -c "from agents.fix_agent import fix_agent; print(fix_agent({'plan_error':'from-comment','terraform_hcl':'','retry_count':0,'pr_number':${{ github.event.issue.number }}}))"

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run apply agent
        run: |
          python -c "from agents.apply_agent import apply_agent; print(apply_agent({'terraform_hcl':'resource \"null_resource\" \"x\" {}','pr_number':${{ needs.plan.outputs.pr_number || 0 }}}))"
